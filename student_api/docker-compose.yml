services:
  db:
    image: mysql:8.0
    container_name: student_api-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: student_db
      MYSQL_USER: adminuser
      MYSQL_PASSWORD: AdminPass123
    ports:
      - "3306:3306"
    volumes:
      - student_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: student_api-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_USER: adminuser
      DB_PASSWORD: AdminPass123
      DB_NAME: student_db
    ports:
      - "8000:8000"
    # Ensure this points to app.main:app if your main.py is inside an /app folder
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

volumes:
  student_db_data: